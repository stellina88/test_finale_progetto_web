<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Finanziario Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="text-white py-4 mb-4 shadow">
        <div class="container text-center">
            <h1 class="fw-bold"><i class="fas fa-wallet me-2"></i>Monitor Finanziario Pro</h1>
            <p class="lead mb-0">Gestione intelligente di entrate e uscite</p>
        </div>
    </header>

    <main class="container">
        <div class="row g-4">
            
            <section class="col-12">
                <div class="row text-center g-3">
                    <div class="col-md-4">
                        <div class="card card-stats-entrata p-3 shadow-sm">
                            <h6 class="text-uppercase text-success fw-bold small">Entrate</h6>
                            <h2 id="totaleEntrate" class="mb-0 text-dark">€ 0.00</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card card-stats-uscita p-3 shadow-sm">
                            <h6 class="text-uppercase text-danger fw-bold small">Uscite</h6>
                            <h2 id="totaleUscite" class="mb-0 text-dark">€ 0.00</h2>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card card-stats-bilancio p-3 shadow-sm">
                            <h6 class="text-uppercase text-primary fw-bold small">Bilancio Totale</h6>
                            <h2 id="bilancioTotale" class="mb-0">€ 0.00</h2>
                        </div>
                    </div>
                </div>
                <div class="mt-2 text-end text-muted small">
                    Operazioni totali: <span id="numeroSpese" class="fw-bold">0</span>
                </div>
            </section>

            <section class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h4 class="card-title mb-4" id="formTitle">Nuova Operazione</h4>
                        <form id="expenseForm">
                            <div class="mb-3">
                                <label class="form-label d-block small fw-bold text-uppercase">Tipo</label>
                                <div class="btn-group w-100" role="group">
                                    <input type="radio" class="btn-check" name="tipo" id="uscita" value="Uscita" checked>
                                    <label class="btn btn-outline-danger" for="uscita">Uscita</label>
                                    <input type="radio" class="btn-check" name="tipo" id="entrata" value="Entrata">
                                    <label class="btn btn-outline-success" for="entrata">Entrata</label>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="descrizione" class="form-label">Descrizione</label>
                                <input type="text" class="form-control" id="descrizione" required>
                            </div>
                            <div class="mb-3">
                                <label for="importo" class="form-label">Importo (€)</label>
                                <input type="number" class="form-control" id="importo" min="0.01" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoria</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="" selected disabled>Scegli...</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Lavoro">Lavoro</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="data" class="form-label">Data</label>
                                <input type="date" class="form-control" id="data" required>
                            </div>
                            <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2">
                                <i class="fas fa-plus me-2"></i>Aggiungi Operazione
                            </button>
                        </form>
                    </div>
                </div>
            </section>

            <section class="col-lg-8">
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                                    <input type="text" id="searchDesc" class="form-control border-start-0" placeholder="Cerca...">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <select id="filterCat" class="form-select">
                                    <option value="Tutte">Tutte le categorie</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Lavoro">Lavoro</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-responsive bg-white rounded-4 shadow-sm">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4">Data</th>
                                <th>Dettaglio</th>
                                <th>Categoria</th>
                                <th>Importo</th>
                                <th class="text-center">Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
