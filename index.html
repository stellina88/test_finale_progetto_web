<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Spese Personali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@180.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <header class="bg-primary text-white py-4 mb-4 shadow">
        <div class="container text-center">
            <h1>Monitor Spese Pro</h1>
            <p class="lead mb-0">Gestisci le tue finanze in modo semplice [cite: 2]</p>
        </div>
    </header>

    <main class="container">
        <div class="row g-4">
            
            <section class="col-12">
                <div class="row text-center">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm p-3">
                            <h5 class="text-muted">Totale Spese [cite: 67]</h5>
                            <h2 id="totaleSpese" class="text-primary">€ 0.00</h2>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm p-3">
                            <h5 class="text-muted">Numero Transazioni [cite: 68]</h5>
                            <h2 id="numeroSpese" class="text-secondary">0</h2>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-lg-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Nuova Spesa</h4>
                        <form id="expenseForm">
                            <div class="mb-3">
                                <label for="descrizione" class="form-label">Descrizione [cite: 32]</label>
                                <input type="text" class="form-control" id="descrizione" required>
                            </div>
                            <div class="mb-3">
                                <label for="importo" class="form-label">Importo (€) [cite: 33]</label>
                                <input type="number" class="form-control" id="importo" min="0.01" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoria [cite: 34]</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="" selected disabled>Scegli...</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro [cite: 114-119]</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="data" class="form-label">Data [cite: 35]</label>
                                <input type="date" class="form-control" id="data" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Aggiungi Spesa [cite: 96]</button>
                        </form>
                    </div>
                </div>
            </section>

            <section class="col-lg-8">
                <div class="card shadow-sm border-0 mb-3">
                    <div class="card-body">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" id="searchDesc" class="form-control" placeholder="Cerca descrizione... [cite: 76]">
                            </div>
                            <div class="col-md-6">
                                <select id="filterCat" class="form-select">
                                    <option value="Tutte">Tutte le categorie [cite: 75]</option>
                                    <option value="Casa">Casa</option>
                                    <option value="Cibo">Cibo</option>
                                    <option value="Trasporti">Trasporti</option>
                                    <option value="Tempo libero">Tempo libero</option>
                                    <option value="Salute">Salute</option>
                                    <option value="Altro">Altro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-responsive bg-white rounded shadow-sm">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Data</th>
                                <th>Descrizione</th>
                                <th>Categoria</th>
                                <th>Importo</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="expenseList">
                            </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
